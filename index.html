<style>
:root{

  --gold:#A5792A; --gold-light:#C9A227; --gold-bg:#F4E9D2; --sage:#7C8B70; --sage-bg:#E7ECDF;
  --border:#E3DDCE; --danger:#AE4A34; --danger-bg:#F3E1DA; --success:#5C7A4C; --success-bg:#E4EBDD;
  --info:#4A6A8A; --info-bg:#DEE7EE; --radius:10px; --shadow:0 1px 2px rgba(58,51,44,.06),0 6px 20px rgba(58,51,44,.06);
  --sidebar-w:232px;
}
*{box-sizing:border-box;} html,body{height:100%;}
body{margin:0;font-family:'Jost','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14.5px;line-height:1.5;}
h1,h2,h3,h4{font-family:'Playfair Display',Georgia,serif;font-weight:600;margin:0 0 4px 0;letter-spacing:.2px;}
a{color:inherit;text-decoration:none;} button{font-family:inherit;font-size:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:inherit;}
.small-caps{text-transform:uppercase;letter-spacing:1.6px;font-size:11px;color:var(--gold);font-weight:500;}
.muted{color:var(--ink-soft);}
#auth-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.auth-card{background:var(--bg-2);border-radius:14px;max-width:400px;width:100%;padding:34px 32px;box-shadow:0 30px 80px rgba(0,0,0,.4);text-align:center;}
.auth-mark{width:60px;height:60px;margin:0 auto 14px;}
.auth-card h2{font-size:21px;margin-bottom:4px;} .auth-card .sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:22px;}
.auth-card .form-row{text-align:left;}
.auth-msg{border-radius:7px;padding:9px 12px;font-size:12.5px;margin-bottom:14px;display:none;}
.auth-msg.show{display:block;} .auth-msg.error{background:var(--danger-bg);color:var(--danger);}
.auth-msg.ok{background:var(--success-bg);color:var(--success);}
.auth-toggle{font-size:12.5px;color:var(--gold);background:none;border:none;margin-top:14px;}
.auth-toggle:hover{text-decoration:underline;}
.auth-lang{position:absolute;top:20px;right:24px;display:flex;gap:6px;}
.lang-btn{padding:5px 10px;border-radius:6px;border:1px solid rgba(239,233,221,.3);background:transparent;color:#D8D0BF;font-size:11.5px;letter-spacing:.5px;}
.lang-btn.active{background:var(--gold);color:#241F19;border-color:var(--gold);}
#app-shell,#client-portal{display:none;}
#app-shell.visible{display:flex;min-height:100vh;}
#client-portal.visible{display:block;min-height:100vh;}
.sidebar{width:var(--sidebar-w);background:var(--ink);color:#EFE9DD;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;padding:26px 18px 18px;}
.brand{display:flex;align-items:center;gap:12px;padding-bottom:16px;margin-bottom:10px;border-bottom:1px solid rgba(239,233,221,.14);}
.brand-mark{width:46px;height:46px;flex-shrink:0;}
.brand-text .name{font-family:'Playfair Display',serif;font-size:16px;letter-spacing:.5px;color:#F4E9D2;line-height:1.2;}
.brand-text .sub{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:#B7AE9C;margin-top:2px;}
.sidebar-lang{display:flex;gap:6px;margin-bottom:16px;}
.nav{list-style:none;margin:0;padding:0;flex:1;} .nav li{margin-bottom:2px;}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;color:#D8D0BF;font-size:13.5px;letter-spacing:.2px;transition:background .15s,color .15s;}
.nav a svg{width:17px;height:17px;flex-shrink:0;opacity:.85;}
.nav a:hover{background:rgba(239,233,221,.08);color:#fff;}
.nav a.active{background:var(--gold);color:#241F19;font-weight:500;} .nav a.active svg{opacity:1;}
.sidebar-footer{border-top:1px solid rgba(239,233,221,.14);padding-top:14px;font-size:11px;color:#8F887A;line-height:1.6;}
.sidebar-footer b{color:#C9A227;}
.signout-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;margin-top:10px;border-radius:7px;border:1px solid rgba(239,233,221,.18);background:transparent;color:#D8D0BF;font-size:12px;}
.signout-btn:hover{background:rgba(239,233,221,.08);color:#fff;} .signout-btn svg{width:14px;height:14px;}
.main{margin-left:var(--sidebar-w);flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{background:var(--bg-2);border-bottom:1px solid var(--border);padding:16px 30px;display:flex;align-items:center;justify-content:space-between;gap:20px;position:sticky;top:0;z-index:20;}
.topbar h1{font-size:22px;} .topbar .page-sub{font-size:12.5px;color:var(--ink-soft);margin-top:1px;}
.view{padding:26px 30px 60px;flex:1;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:8px;border:1px solid transparent;font-size:13.5px;font-weight:500;letter-spacing:.2px;background:var(--ink);color:#fff;transition:opacity .15s,transform .1s;}
.btn svg{width:14px;height:14px;} .btn:hover{opacity:.88;} .btn:active{transform:scale(.98);}
.btn-gold{background:var(--gold);color:#28221B;} .btn-outline{background:transparent;border:1px solid var(--border);color:var(--ink);}
.btn-outline:hover{background:#fff;} .btn-sage{background:var(--sage);color:#fff;} .btn-danger{background:var(--danger);color:#fff;}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:7px;} .btn-icon{padding:8px;border-radius:7px;background:transparent;border:1px solid var(--border);color:var(--ink-soft);}
.btn-icon:hover{background:#fff;color:var(--ink);} .btn[disabled]{opacity:.45;cursor:not-allowed;} .btn-block{width:100%;justify-content:center;}
.link-btn{background:none;border:none;color:var(--gold);font-weight:500;padding:0;} .link-btn:hover{text-decoration:underline;}
.grid{display:grid;gap:18px;} .grid-4{grid-template-columns:repeat(4,1fr);} .grid-3{grid-template-columns:repeat(3,1fr);} .grid-2{grid-template-columns:2fr 1fr;}
@media (max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-2{grid-template-columns:1fr;}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;} .card-head h3{font-size:16px;}
.kpi{padding:18px 20px;} .kpi .small-caps{margin-bottom:8px;display:block;} .kpi .value{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;}
.kpi .delta{font-size:12px;margin-top:6px;color:var(--ink-soft);} .kpi .delta.up{color:var(--success);} .kpi .delta.down{color:var(--danger);}
.table-wrap{overflow-x:auto;} table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);font-weight:500;padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle;} tbody tr{transition:background .12s;cursor:pointer;}
tbody tr:hover{background:var(--bg);} tbody tr:last-child td{border-bottom:none;}
.row-name{font-weight:500;} .row-name .sub{display:block;font-size:11.5px;color:var(--ink-soft);font-weight:400;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:500;letter-spacing:.3px;white-space:nowrap;}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;} .badge-gray{background:#EEEAE0;color:var(--ink-soft);}
.badge-gold{background:var(--gold-bg);color:#8A5F17;} .badge-sage{background:var(--sage-bg);color:var(--sage);}
.badge-info{background:var(--info-bg);color:var(--info);} .badge-success{background:var(--success-bg);color:var(--success);} .badge-danger{background:var(--danger-bg);color:var(--danger);}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap;} .filters{display:flex;gap:8px;flex-wrap:wrap;}
.chip{padding:7px 14px;border-radius:100px;border:1px solid var(--border);background:#fff;font-size:12.5px;color:var(--ink-soft);}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.empty{text-align:center;padding:50px 20px;color:var(--ink-soft);} .empty svg{width:40px;height:40px;color:var(--ink-faint);margin-bottom:10px;} .empty h4{color:var(--ink);margin-bottom:4px;}
.modal-overlay{position:fixed;inset:0;background:rgba(58,51,44,.45);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;z-index:100;}
.modal{background:#fff;border-radius:12px;max-width:640px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:pop .15s ease-out;}
@keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);} .modal-head h3{font-size:18px;}
.modal-body{padding:22px 24px;max-height:70vh;overflow-y:auto;} .modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.modal-close{background:none;border:none;font-size:20px;color:var(--ink-soft);line-height:1;padding:4px;}
.form-row{margin-bottom:14px;} .form-row label{display:block;font-size:12px;font-weight:500;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.2px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;background:var(--bg-2);color:var(--ink);outline:none;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--gold);background:#fff;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;} .form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;} textarea{resize:vertical;min-height:70px;}
.line-items{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px;}
.line-item-row{display:grid;grid-template-columns:1fr 70px 100px 32px;gap:8px;padding:10px;border-bottom:1px solid var(--border);align-items:center;}
.line-item-row:last-child{border-bottom:none;} .line-item-row input{padding:7px 9px;} .li-remove{background:none;border:none;color:var(--danger);font-size:16px;}

.kanban-count{background:#fff;border-radius:100px;padding:2px 8px;font-size:11px;color:var(--ink-soft);}
.job-card{background:#fff;border-radius:9px;padding:13px 14px;margin-bottom:10px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;}

.toast{background:var(--ink);color:#F4E9D2;padding:13px 18px;border-radius:8px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.25);display:flex;align-items:center;gap:10px;animation:slideIn .2s ease-out;min-width:240px;}

.loading-spinner{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--ink-soft);font-size:13px;}

.cp-body{max-width:900px;margin:0 auto;padding:30px 20px 60px;}
</style>

let clientPortalData = null; // populated after login (client)
let myProfile = null;
let route='dashboard', subRoute=null;

function uid(p){ return p+'_'+Math.random().toString(36).slice(2,9); }
function fmtMoney(n){ n=Number(n)||0; const l=LANG==='es'?'es-ES':'en-US'; return '$'+n.toLocaleString(l,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso+'T00:00:00'); const l=LANG==='es'?'es-ES':'en-US'; return d.toLocaleDateString(l,{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateShort(iso){ const d=new Date(iso+'T00:00:00'); const l=LANG==='es'?'es-ES':'en-US'; return d.toLocaleDateString(l,{day:'2-digit',month:'short'}); }
function getClient(id){ return state.clients.find(c=>c.id===id); }
function getTeamMember(id){ return state.team.find(x=>x.id===id); }
function calcLineItemsTotal(items){ return items.reduce((s,i)=>s+(Number(i.qty)||0)*(Number(i.rate)||0),0); }
function calcQuoteTotal(q){ const sub=calcLineItemsTotal(q.items); const tax=sub*(Number(q.taxRate)||0)/100; return {sub,tax,total:sub+tax}; }
function calcInvoiceTotal(inv){ const sub=calcLineItemsTotal(inv.items); const tax=sub*(Number(inv.taxRate)||0)/100; const total=sub+tax; const balance=total-(Number(inv.amountPaid)||0); return {sub,tax,total,balance}; }
function initials(name){ return (name||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function todayISO(off){ const d=new Date(); d.setDate(d.getDate()+(off||0)); return d.toISOString().slice(0,10); }
function toast(msg, icon){ const wrap=document.getElementById('toast-wrap'); const el=document.createElement('div'); el.className='toast'; el.innerHTML=(icon||ICONS.check)+'<span>'+escapeHtml(msg)+'</span>'; wrap.appendChild(el); setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},3200); }
function setLang(l){ LANG=l; localStorage.setItem('dreamclean_lang', l); rerenderCurrentScreen(); }
function rerenderCurrentScreen(){
  if(document.getElementById('app-shell').classList.contains('visible')) render();
  else if(document.getElementById('client-portal').classList.contains('visible')) renderClientPortal();
  else renderAuthScreen();
}

  const screen = document.getElementById('auth-screen');
  const brandMark = `<svg class="auth-mark" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="47" stroke="#C9A227" stroke-width="2.5"/><circle cx="50" cy="50" r="41" stroke="#C9A227" stroke-width="0.75"/><text x="50" y="61" text-anchor="middle" font-family="Playfair Display, serif" font-size="34" fill="#3A332C">DC</text></svg>`;
  screen.style.display = 'flex';
  document.getElementById('app-shell').classList.remove('visible');
  document.getElementById('client-portal').classList.remove('visible');
  if(mode==='signup'){
    screen.innerHTML = `
      <div class="auth-lang"><button class="lang-btn ${LANG==='en'?'active':''}" onclick="setLang('en')">EN</button><button class="lang-btn ${LANG==='es'?'active':''}" onclick="setLang('es')">ES</button></div>
      <div class="auth-card">
        ${brandMark}
        <h2>${t('auth_signup_title')}</h2>
        <div class="sub">${t('auth_sub')}</div>
        <div class="auth-msg" id="auth-msg"></div>
        <div class="form-row"><label>${t('lbl_name')}</label><input id="su-name"></div>
        <div class="form-row"><label>${t('lbl_email')}</label><input id="su-email" type="email"></div>
        <div class="form-row"><label>${t('lbl_password')}</label><input id="su-password" type="password"></div>
        <button class="btn btn-gold btn-block" onclick="doSignUp()">${t('signup_btn')}</button>
        <button class="auth-toggle" onclick="renderAuthScreen('signin')">${t('have_account')}</button>
      </div>`;
  } else {
    screen.innerHTML = `
      <div class="auth-lang"><button class="lang-btn ${LANG==='en'?'active':''}" onclick="setLang('en')">EN</button><button class="lang-btn ${LANG==='es'?'active':''}" onclick="setLang('es')">ES</button></div>
      <div class="auth-card">
        ${brandMark}
        <h2>${t('auth_signin_title')}</h2>
        <div class="sub">${t('auth_sub')}</div>
        <div class="auth-msg" id="auth-msg"></div>
        <div class="form-row"><label>${t('lbl_email')}</label><input id="si-email" type="email"></div>
        <div class="form-row"><label>${t('lbl_password')}</label><input id="si-password" type="password"></div>
        <button class="btn btn-gold btn-block" onclick="doSignIn()">${t('signin_btn')}</button>
        <button class="auth-toggle" onclick="renderAuthScreen('signup')">${t('no_account')}</button>
      </div>`;
  }
}
function showAuthMsg(msg, kind){
  const box = document.getElementById('auth-msg');
  if(!box) return;
  box.textContent = msg;
  box.className = 'auth-msg show ' + (kind||'error');
}
async function doSignUp(){
  const full_name = document.getElementById('su-name').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const password = document.getElementById('su-password').value;
  if(!full_name || !email || password.length<6){ showAuthMsg(t('err_generic'),'error'); return; }
  const { data, error } = await sb.auth.signUp({ email, password, options:{ data:{ full_name } } });
  if(error){ showAuthMsg(error.message, 'error'); return; }
  if(data.session){ await afterLogin(); }
  else { showAuthMsg(t('check_email'), 'ok'); }
}
async function doSignIn(){
  const email = document.getElementById('si-email').value.trim();
  const password = document.getElementById('si-password').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ showAuthMsg(error.message, 'error'); return; }
  await afterLogin();
}
async function doSignOut(){
  await sb.auth.signOut();
  state = null; clientPortalData = null; myProfile = null;
  renderAuthScreen('signin');
}
async function afterLogin(){
  const { data: { user } } = await sb.auth.getUser();
  if(!user){ renderAuthScreen('signin'); return; }
  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if(error || !profile){ showAuthMsg(t('err_generic'),'error'); return; }
  myProfile = profile;
  await loadServiceMeta();
  if(profile.role === 'staff'){
    await loadStaffData();
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-shell').classList.add('visible');
    route='dashboard'; subRoute=null;
    render();
  } else {
    await loadClientPortalData(profile.client_id);
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('client-portal').classList.add('visible');
    renderClientPortal();
    checkPaymentReturn();
  }
}

async function loadServiceMeta(){
  const { data, error } = await sb.from('services').select('*');
  if(error) return;
  data.forEach(s=>{
    SERVICE_META[s.id] = { id:s.id, name:{en:s.name_en, es:s.name_es}, desc:{en:s.desc_en, es:s.desc_es}, category:s.category, unit:s.unit, rate:Number(s.rate) };
  });
}

/* ============================ STAFF DATA LAYER ============================ */
async function loadStaffData(){
  const [clientsRes, propsRes, teamRes, quotesRes, jobsRes, invRes, bizRes, profilesRes, docsRes, sigsRes] = await Promise.all([
    sb.from('clients').select('*').order('name'),
    sb.from('properties').select('*'),
    sb.from('team_members').select('*'),
    sb.from('quotes').select('*, quote_items(*)').order('created_at', {ascending:false}),
    sb.from('jobs').select('*'),
    sb.from('invoices').select('*, invoice_items(*)').order('issue_date', {ascending:false}),
    sb.from('business_settings').select('*').eq('id',1).single(),
    sb.from('profiles').select('id, client_id, role').eq('role','client'),
    sb.from('documents').select('*').order('created_at', {ascending:false}),
    sb.from('document_signatures').select('*')
  ]);
  const props = propsRes.data || [];
  state = {
    clients: (clientsRes.data||[]).map(c=>({ ...c, properties: props.filter(p=>p.client_id===c.id) })),
    team: teamRes.data || [],
    linkedClientIds: new Set((profilesRes.data||[]).filter(p=>p.client_id).map(p=>p.client_id)),
    quotes: (quotesRes.data||[]).map(q=>({
      id:q.id, clientId:q.client_id, propertyId:q.property_id, service:q.service_id, status:q.status,
      notes:q.notes, taxRate:Number(q.tax_rate)||0, createdAt:(q.created_at||'').slice(0,10),
      items:(q.quote_items||[]).map(it=>({id:it.id, desc:it.description, qty:Number(it.qty), rate:Number(it.rate)}))
    })),
    jobs: (jobsRes.data||[]).map(j=>({
      id:j.id, quoteId:j.quote_id, clientId:j.client_id, propertyId:j.property_id, service:j.service_id, status:j.status,
      date:j.job_date, time:(j.job_time||'').slice(0,5), duration:Number(j.duration), assignedTo:j.assigned_to,
      recurring:j.recurring, notes:j.notes
    })),
    invoices: (invRes.data||[]).map(inv=>({
      id:inv.id, invoiceNumber:inv.invoice_number, jobId:inv.job_id, clientId:inv.client_id, status:inv.status,
      issueDate:inv.issue_date, dueDate:inv.due_date, taxRate:Number(inv.tax_rate)||0, amountPaid:Number(inv.amount_paid)||0,
      paymentMethod:inv.payment_method,
      items:(inv.invoice_items||[]).map(it=>({id:it.id, desc:it.description, qty:Number(it.qty), rate:Number(it.rate)}))
    })),
    business: bizRes.data ? {
      name:bizRes.data.name, tagline:bizRes.data.tagline, phone:bizRes.data.phone, email:bizRes.data.email,
      website:bizRes.data.website, address:bizRes.data.address, taxRate:Number(bizRes.data.tax_rate)||0
    } : { name:'Dream Clean by DC', taxRate:0 },
    documents: (docsRes.data||[]).map(d=>({ id:d.id, clientId:d.client_id, title:d.title, docType:d.doc_type, filePath:d.file_path, createdAt:d.created_at })),
    documentSignatures: (sigsRes.data||[]).map(s=>({ id:s.id, documentId:s.document_id, clientId:s.client_id, signedName:s.signed_name, signedAt:s.signed_at }))
  };
}
function serviceOptionsHtml(selected){
  return Object.values(SERVICE_META).map(s=>`<option value="${s.id}" ${selected===s.id?'selected':''}>${svcName(s)}</option>`).join('');
}
function clientPortalLinked(clientId){ return !!(state.linkedClientIds && state.linkedClientIds.has(clientId)); }

/* ================================= ROUTER / NAV ================================= */
const NAV_ITEMS=[{route:'dashboard',key:'nav_dashboard',icon:'dashboard'},{route:'clients',key:'nav_clients',icon:'clients'},{route:'quotes',key:'nav_quotes',icon:'quotes'},{route:'jobs',key:'nav_jobs',icon:'jobs'},{route:'calendar',key:'nav_calendar',icon:'calendar'},{route:'invoices',key:'nav_invoices',icon:'invoices'},{route:'documents',key:'nav_documents',icon:'doc'},{route:'reports',key:'nav_reports',icon:'reports'},{route:'settings',key:'nav_settings',icon:'settings'}];
const PAGE_TITLE_KEYS={dashboard:['nav_dashboard','dashboard_sub'],clients:['nav_clients','clients_sub'],quotes:['nav_quotes','quotes_sub'],jobs:['nav_jobs','jobs_sub'],calendar:['nav_calendar','calendar_sub'],invoices:['nav_invoices','invoices_sub'],documents:['nav_documents','documents_sub'],reports:['nav_reports','reports_sub'],settings:['nav_settings','settings_sub']};
function navigate(r,sub){ route=r; subRoute=sub||null; render(); window.scrollTo(0,0); }
function renderNav(){
  document.getElementById('nav-list').innerHTML = NAV_ITEMS.map(item=>`<li><a href="#" class="${route===item.route?'active':''}" onclick="navigate('${item.route}');return false;">${ICONS[item.icon]}<span>${t(item.key)}</span></a></li>`).join('');
  document.getElementById('sidebar-lang').innerHTML = `<button class="lang-btn ${LANG==='en'?'active':''}" onclick="setLang('en')">EN</button><button class="lang-btn ${LANG==='es'?'active':''}" onclick="setLang('es')">ES</button>`;
  document.getElementById('sidebar-footer-label').textContent = t('sidebar_footer');
  document.getElementById('signout-label').textContent = t('sign_out');
  document.getElementById('new-btn-label').textContent = t('btn_new');
}
function render(){
  renderNav();
  const keys = PAGE_TITLE_KEYS[route]||['nav_dashboard',''];
  document.getElementById('page-title').textContent = t(keys[0]);
  document.getElementById('page-sub').textContent = t(keys[1]);
  const view = document.getElementById('view');
  if(route==='dashboard') view.innerHTML = renderDashboard();
  else if(route==='clients') view.innerHTML = subRoute? renderClientDetail(subRoute): renderClients();
  else if(route==='quotes') view.innerHTML = renderQuotes();
  else if(route==='jobs') view.innerHTML = renderJobs();
  else if(route==='calendar') view.innerHTML = renderCalendar();
  else if(route==='invoices') view.innerHTML = subRoute? renderInvoiceDetail(subRoute): renderInvoices();
  else if(route==='documents') view.innerHTML = renderDocuments();
  else if(route==='reports') view.innerHTML = renderReports();
  else if(route==='settings') view.innerHTML = renderSettings();
}

/* ================================ DASHBOARD ================================ */
function renderDashboard(){
  const today = todayISO(0);
  const upcomingJobs = state.jobs.filter(j=>j.date>=today && j.status!=='completed').sort((a,b)=>a.date.localeCompare(b.date));
  const todaysJobs = state.jobs.filter(j=>j.date===today);
  const outstandingInvoices = state.invoices.filter(i=>['sent','overdue','partial'].includes(i.status));
  const outstandingTotal = outstandingInvoices.reduce((s,i)=>s+calcInvoiceTotal(i).balance,0);
  const paidToDate = state.invoices.filter(i=>i.status==='paid').reduce((s,i)=>s+(Number(i.amountPaid)||0),0);
  const pendingQuotes = state.quotes.filter(q=>q.status==='sent'||q.status==='draft');
  return `
    <div class="helper-note">${ICONS.info}<div>${t('helper_note')}</div></div>
    <div class="grid grid-4" style="margin-bottom:20px;">
      <div class="card kpi"><span class="small-caps">${t('kpi_active_clients')}</span><div class="value">${state.clients.length}</div>
        <div class="delta">${state.clients.filter(c=>c.type==='residential').length} ${t('residential').toLowerCase()} · ${state.clients.filter(c=>c.type==='commercial').length} ${t('commercial').toLowerCase()}</div></div>
      <div class="card kpi"><span class="small-caps">${t('kpi_upcoming_jobs')}</span><div class="value">${upcomingJobs.length}</div><div class="delta">${todaysJobs.length} ${t('scheduled_today')}</div></div>
      <div class="card kpi"><span class="small-caps">${t('kpi_outstanding')}</span><div class="value">${fmtMoney(outstandingTotal)}</div><div class="delta ${state.invoices.some(i=>i.status==='overdue')?'down':''}">${state.invoices.filter(i=>i.status==='overdue').length} ${t('overdue_invoices_suffix')}</div></div>
      <div class="card kpi"><span class="small-caps">${t('kpi_collected')}</span><div class="value">${fmtMoney(paidToDate)}</div><div class="delta up">${state.invoices.filter(i=>i.status==='paid').length} ${t('paid_invoices_suffix')}</div></div>
    </div>
    <div class="grid grid-2">
      <div class="card">
        <div class="card-head"><h3>${t('todays_schedule')} — ${fmtDate(today)}</h3><button class="btn btn-outline btn-sm" onclick="navigate('calendar')">${t('view_calendar')} ${ICONS.arrow}</button></div>
        ${todaysJobs.length? `<div class="table-wrap"><table><thead><tr><th>${t('th_time')}</th><th>${t('th_client')}</th><th>${t('th_service')}</th><th>${t('th_team')}</th><th>${t('th_status')}</th></tr></thead><tbody>
        ${todaysJobs.sort((a,b)=>a.time.localeCompare(b.time)).map(j=>{ const c=getClient(j.clientId); const svc=getService(j.service); const tm=getTeamMember(j.assignedTo);
          return `<tr onclick="openJobModal('${j.id}')"><td>${j.time}</td><td class="row-name">${escapeHtml(c?c.name:'—')}</td><td>${svcName(svc)}</td><td>${tm?escapeHtml(tm.name):t('unassigned')}</td><td><span class="badge ${statusBadgeClass(j.status)}"><span class="badge-dot"></span>${statusLabel(j.status)}</span></td></tr>`;
        }).join('')}</tbody></table></div>` : `<div class="empty">${ICONS.calendar}<h4>${t('no_jobs_today')}</h4></div>`}
      </div>
      <div class="card">
        <div class="card-head"><h3>${t('pending_quotes')}</h3></div>
        ${pendingQuotes.length? pendingQuotes.map(q=>{ const c=getClient(q.clientId); const tt=calcQuoteTotal(q);
          return `<div class="job-card" onclick="openQuoteModal('${q.id}')"><div class="jc-title">${escapeHtml(c?c.name:'—')} — ${fmtMoney(tt.total)}</div><div class="jc-meta"><span class="badge ${statusBadgeClass(q.status)}">${statusLabel(q.status)}</span></div></div>`;
        }).join('') : `<div class="empty" style="padding:26px 10px;">${ICONS.quotes}<div>${t('no_pending_quotes')}</div></div>`}

    <div class="grid grid-2" style="margin-top:18px;">

        }).join('')}
      </div>
    </div>`;
}

  const cq = state.quotes.filter(q=>q.clientId===id), cj = state.jobs.filter(j=>j.clientId===id), ci = state.invoices.filter(i=>i.clientId===id);
  const lifetime = ci.filter(i=>i.status==='paid').reduce((s,i)=>s+(Number(i.amountPaid)||0),0);
  return `
    <button class="btn-icon" style="margin-bottom:16px;" onclick="navigate('clients')">${ICONS.arrow.replace('stroke-width="2.2"','stroke-width="2.2" style="transform:rotate(180deg)"')}</button>

/* ================================ CALENDAR ================================= */
let calCursor = new Date();
function renderCalendar(){
  const year=calCursor.getFullYear(), month=calCursor.getMonth();
  const firstDay=new Date(year,month,1); const startOffset=firstDay.getDay(); const daysInMonth=new Date(year,month+1,0).getDate();
  const locale=LANG==='es'?'es-ES':'en-US'; const monthName=calCursor.toLocaleDateString(locale,{month:'long',year:'numeric'}); const today=todayISO(0);
  const cells=[]; for(let i=0;i<startOffset;i++){ const d=new Date(year,month,1-(startOffset-i)); cells.push({date:d,other:true}); }
  for(let d=1; d<=daysInMonth; d++) cells.push({date:new Date(year,month,d),other:false});
  while(cells.length%7!==0){ const last=cells[cells.length-1].date; cells.push({date:new Date(last.getFullYear(),last.getMonth(),last.getDate()+1),other:true}); }
  const dayNames = LANG==='es'? ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'] : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `<div class="toolbar"><div style="display:flex;align-items:center;gap:12px;"><button class="btn-icon" onclick="calCursor.setMonth(calCursor.getMonth()-1); render();">${ICONS.arrow.replace('stroke-width="2.2"','style="transform:rotate(180deg)"')}</button><h3 style="min-width:180px;text-transform:capitalize;">${monthName}</h3><button class="btn-icon" onclick="calCursor.setMonth(calCursor.getMonth()+1); render();">${ICONS.arrow}</button><button class="btn btn-outline btn-sm" onclick="calCursor=new Date(); render();">${t('today_btn')}</button></div><button class="btn btn-gold" onclick="openJobModal()">+ ${t('new_job')}</button></div>
  <div class="cal-grid" style="margin-bottom:8px;">${dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}</div>
  <div class="cal-grid">${cells.map(cell=>{ const iso=cell.date.toISOString().slice(0,10); const jobsForDay=state.jobs.filter(j=>j.date===iso).sort((a,b)=>a.time.localeCompare(b.time));
    return `<div class="cal-cell ${cell.other?'other-month':''} ${iso===today?'today':''}"><div class="cal-date">${cell.date.getDate()}</div>${jobsForDay.slice(0,3).map(j=>{ const c=getClient(j.clientId); const sc=j.status==='completed'?'status-completed':(j.status==='in_progress'?'status-inprogress':'');

async function saveInvoice(id){
  const clientId=document.getElementById('i-client').value, status=document.getElementById('i-status').value, issueDate=document.getElementById('i-issue').value, dueDate=document.getElementById('i-due').value;
  const items=readLineItems('i-items');
  if(!items.length){ toast(t('err_generic'), ICONS.info); return; }
  let invId = id;
  const payload = { client_id:clientId, status, issue_date:issueDate, due_date:dueDate, tax_rate: state.business.taxRate };
  if(id){ const { error } = await sb.from('invoices').update(payload).eq('id', id); if(error){ toast(error.message,ICONS.info); return; } }
  else { const { data, error } = await sb.from('invoices').insert(payload).select().single(); if(error){ toast(error.message,ICONS.info); return; } invId = data.id; }
  await sb.from('invoice_items').delete().eq('invoice_id', invId);
  await sb.from('invoice_items').insert(items.map(it=>({invoice_id:invId, description:it.desc, qty:it.qty, rate:it.rate})));
  await loadStaffData(); closeModal(); render();
  toast(t('save_invoice'));
}

async function recordPayment(id){
  const inv = state.invoices.find(x=>x.id===id);
  const amount = parseFloat(document.getElementById('p-amount').value)||0;
  const method = document.getElementById('p-method').value;
  const newPaid = (Number(inv.amountPaid)||0) + amount;
  const tempTotal = calcInvoiceTotal({...inv, amountPaid:newPaid});
  const newStatus = tempTotal.balance <= 0.005 ? 'paid' : 'partial';

  if(error){ toast(error.message, ICONS.info); return; }

async function uploadDocument(){
  const title = document.getElementById('d-title').value.trim();
  const docType = document.getElementById('d-type').value;
  const targetClientId = document.getElementById('d-target').value || null;
  const fileInput = document.getElementById('d-file');
  const file = fileInput.files[0];
  if(!title || !file){ toast(t('err_generic'), ICONS.info); return; }
  document.getElementById('d-status').textContent = t('uploading');
  document.getElementById('d-submit').setAttribute('disabled','disabled');
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const path = `${targetClientId || 'standard'}/${Date.now()}_${safeName}`;
  const { error: upErr } = await sb.storage.from('documents').upload(path, file, { contentType:'application/pdf', upsert:false });
  if(upErr){ toast(upErr.message, ICONS.info); document.getElementById('d-status').textContent=''; document.getElementById('d-submit').removeAttribute('disabled'); return; }
  const { error: insErr } = await sb.from('documents').insert({ title, doc_type:docType, client_id:targetClientId, file_path:path });
  if(insErr){ toast(insErr.message, ICONS.info); return; }
  await loadStaffData(); closeModal(); render();
  toast(t('upload_document'));
}
async function viewDocumentFile(filePath){
  const { data, error } = await sb.storage.from('documents').createSignedUrl(filePath, 300);
  if(error || !data){ toast(t('err_generic'), ICONS.info); return; }
  window.open(data.signedUrl, '_blank');
}
async function deleteDocument(id){
  if(!confirm(t('confirm_delete_document'))) return;
  const doc = state.documents.find(d=>d.id===id);
  const { error } = await sb.from('documents').delete().eq('id', id);
  if(error){ toast(error.message, ICONS.info); return; }
  if(doc) await sb.storage.from('documents').remove([doc.filePath]);
  await loadStaffData(); render();
  toast(t('delete_document'));
}

async function updateServiceRate(id, val){
  const rate = parseFloat(val)||0;
  const { error } = await sb.from('services').update({rate}).eq('id', id);
  if(error){ toast(error.message, ICONS.info); return; }
  await loadServiceMeta(); render();
  toast(t('save_changes'));
}
function openTeamModal(id){
  const tm = id? getTeamMember(id): null;
  openModal(`<div class="modal-head"><h3>${tm?t('edit_member'):t('new_member')}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body"><div class="form-row"><label>${t('lbl_name')}</label><input id="tm-name" value="${tm?escapeHtml(tm.name):''}"></div>
  <div class="form-grid"><div class="form-row"><label>${t('lbl_role')}</label><input id="tm-role" value="${tm?escapeHtml(tm.role||''):''}" placeholder="${t('ph_role')}"></div><div class="form-row"><label>${t('lbl_phone')}</label><input id="tm-phone" value="${tm?escapeHtml(tm.phone||''):''}"></div></div></div>
  <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-gold" onclick="saveTeamMember(${tm?`'${tm.id}'`:'null'})">${t('save')}</button></div>`);
}
async function saveTeamMember(id){
  const name=document.getElementById('tm-name').value.trim(), role=document.getElementById('tm-role').value.trim(), phone=document.getElementById('tm-phone').value.trim();
  if(!name){ toast(t('err_generic'), ICONS.info); return; }
  const colors=['#A5792A','#7C8B70','#4A6A8A','#AE4A34','#8A6FA3'];
  const payload = { name, role, phone };
  if(id){ const { error } = await sb.from('team_members').update(payload).eq('id', id); if(error){ toast(error.message,ICONS.info); return; } }
  else { payload.color = colors[state.team.length % colors.length]; const { error } = await sb.from('team_members').insert(payload); if(error){ toast(error.message,ICONS.info); return; } }
  await loadStaffData(); closeModal(); render();
  toast(t('save'));
}
async function deleteTeamMember(id){ if(!confirm(t('confirm_remove_member'))) return; const { error } = await sb.from('team_members').delete().eq('id', id); if(error){ toast(error.message,ICONS.info); return; } await loadStaffData(); render(); toast(t('delete')); }

/* ================================= MODALS =================================== */
function openModal(html){ document.getElementById('modal-root').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this) closeModal()"><div class="modal">${html}</div></div>`; }
function closeModal(){ document.getElementById('modal-root').innerHTML = ''; }
function openQuickAddMenu(e){
  e.stopPropagation();
  openModal(`<div class="modal-head"><h3>${t('create_new')}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body" style="display:grid;gap:10px;">
    <button class="btn btn-outline" style="justify-content:flex-start;" onclick="closeModal();openClientModal();">${ICONS.clients} ${t('qa_client')}</button>
    <button class="btn btn-outline" style="justify-content:flex-start;" onclick="closeModal();openQuoteModal();">${ICONS.quotes} ${t('qa_quote')}</button>
    <button class="btn btn-outline" style="justify-content:flex-start;" onclick="closeModal();openJobModal();">${ICONS.jobs} ${t('qa_job')}</button>
    <button class="btn btn-outline" style="justify-content:flex-start;" onclick="closeModal();openInvoiceModal();">${ICONS.invoices} ${t('qa_invoice')}</button>
  </div>`);
}

/* ============================ CLIENT PORTAL ============================ */
async function loadClientPortalData(clientId){
  if(!clientId){ clientPortalData = { client:null, properties:[], jobs:[], quotes:[], invoices:[], documents:[], documentSignatures:[] }; return; }
  const [clientRes, propsRes, jobsRes, quotesRes, invRes, docsRes, sigsRes] = await Promise.all([
    sb.from('clients').select('*').eq('id', clientId).single(),
    sb.from('properties').select('*').eq('client_id', clientId),
    sb.from('jobs').select('*').eq('client_id', clientId),
    sb.from('quotes').select('*, quote_items(*)').eq('client_id', clientId),
    sb.from('invoices').select('*, invoice_items(*)').eq('client_id', clientId),
    sb.from('documents').select('*'),
    sb.from('document_signatures').select('*').eq('client_id', clientId)
  ]);
  clientPortalData = {
    client: clientRes.data,
    properties: propsRes.data || [],
    jobs: (jobsRes.data||[]).map(j=>({ id:j.id, service:j.service_id, status:j.status, date:j.job_date, time:(j.job_time||'').slice(0,5) })),
    quotes: (quotesRes.data||[]).map(q=>({ id:q.id, service:q.service_id, status:q.status, taxRate:Number(q.tax_rate)||0, items:(q.quote_items||[]).map(it=>({desc:it.description, qty:Number(it.qty), rate:Number(it.rate)})) })),
    invoices: (invRes.data||[]).map(inv=>({ id:inv.id, status:inv.status, issueDate:inv.issue_date, dueDate:inv.due_date, taxRate:Number(inv.tax_rate)||0, amountPaid:Number(inv.amount_paid)||0, items:(inv.invoice_items||[]).map(it=>({desc:it.description, qty:Number(it.qty), rate:Number(it.rate)})) })),
    documents: (docsRes.data||[]).map(d=>({ id:d.id, clientId:d.client_id, title:d.title, docType:d.doc_type, filePath:d.file_path })),
    documentSignatures: (sigsRes.data||[]).map(s=>({ id:s.id, documentId:s.document_id, signedName:s.signed_name, signedAt:s.signed_at }))
  };
}
function renderClientPortal(){
  const d = clientPortalData;
  const el = document.getElementById('client-portal');
  const topbar = `<div class="cp-topbar">
      <div style="display:flex;align-items:center;gap:12px;"><svg width="36" height="36" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="47" stroke="#C9A227" stroke-width="2.5"/><text x="50" y="61" text-anchor="middle" font-family="Playfair Display, serif" font-size="34" fill="#F4E9D2">DC</text></svg><b>Dream Clean by DC</b></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="lang-btn ${LANG==='en'?'active':''}" onclick="setLang('en')">EN</button><button class="lang-btn ${LANG==='es'?'active':''}" onclick="setLang('es')">ES</button>
        <button class="btn btn-outline btn-sm" onclick="doSignOut()">${t('sign_out')}</button>
      </div>
    </div>`;
  if(!d || !d.client){
    el.innerHTML = topbar + `<div class="cp-body"><div class="empty">${ICONS.info}<h4>${t('cp_not_linked')}</h4></div></div>`;
    return;
  }
  const today = todayISO(0);
  const upcoming = d.jobs.filter(j=>j.date>=today && j.status!=='completed').sort((a,b)=>a.date.localeCompare(b.date));
  const past = d.jobs.filter(j=>j.status==='completed').sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  const pendingQuotes = d.quotes.filter(q=>q.status==='sent');
  const signedDocIds = new Set(d.documentSignatures.map(s=>s.documentId));
  const pendingDocs = d.documents.filter(doc=>!signedDocIds.has(doc.id));
  const signedDocs = d.documents.filter(doc=>signedDocIds.has(doc.id)).map(doc=>({ doc, sig: d.documentSignatures.find(s=>s.documentId===doc.id) }));
  el.innerHTML = topbar + `
    <div class="cp-body">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-top:10px;">
        <h2 style="font-size:24px;">${t('cp_greeting')}, ${escapeHtml(d.client.name)}</h2>
        <button class="btn btn-gold btn-sm" onclick="openRequestQuoteModal()">+ ${t('cp_request_quote')}</button>
      </div>
      <div class="grid grid-2" style="margin-top:20px;">
        <div class="card"><div class="card-head"><h3>${t('cp_properties')}</h3></div>
          ${d.properties.length? d.properties.map(p=>`<div class="info-line">${ICONS.pin}<b>${escapeHtml(p.label||'')}:</b>&nbsp;${escapeHtml(p.address||'')}</div>`).join(''):`<div class="muted" style="font-size:12.5px;">—</div>`}
        </div>
        <div class="card"><div class="card-head"><h3>${t('cp_upcoming')}</h3></div>
          ${upcoming.length? upcoming.map(j=>{ const svc=getService(j.service);
            return `<div class="job-card"><div class="jc-title">${svcName(svc)}</div><div class="jc-meta">${ICONS.calendar}${fmtDateShort(j.date)} · ${j.time}</div></div>`;
          }).join('') : `<div class="muted" style="font-size:12.5px;">${t('cp_no_upcoming')}</div>`}
        </div>
      </div>
      <div class="card" style="margin-top:18px;"><div class="card-head"><h3>${t('cp_quotes')}</h3></div>
        ${pendingQuotes.length? pendingQuotes.map(q=>{ const svc=getService(q.service); const tt=calcQuoteTotal(q);
          return `<div class="job-card"><div class="jc-title">${svcName(svc)} — ${fmtMoney(tt.total)}</div>
            <div style="display:flex;gap:8px;margin-top:10px;"><button class="btn btn-sage btn-sm" onclick="clientRespondQuote('${q.id}','approved')">${t('cp_approve')}</button><button class="btn btn-outline btn-sm" onclick="clientRespondQuote('${q.id}','declined')">${t('cp_decline')}</button></div>
          </div>`;
        }).join('') : `<div class="muted" style="font-size:12.5px;">${t('cp_no_quotes')}</div>`}
      </div>
      <div class="card" style="margin-top:18px;"><div class="card-head"><h3>${t('cp_invoices')}</h3></div>
        ${d.invoices.length? `<div class="table-wrap"><table><thead><tr><th>#</th><th>${t('th_due')}</th><th>${t('th_balance')}</th><th>${t('th_status')}</th><th></th></tr></thead><tbody>
        ${d.invoices.map(inv=>{ const tt=calcInvoiceTotal(inv);
          return `<tr><td>#${inv.id.slice(0,6)}</td><td>${fmtDateShort(inv.dueDate)}</td><td>${fmtMoney(tt.balance)}</td><td><span class="badge ${statusBadgeClass(inv.status)}">${statusLabel(inv.status)}</span></td><td>${inv.status!=='paid'?`<button class="btn btn-gold btn-sm" onclick="payInvoiceNow('${inv.id}')">${t('cp_pay_now')}</button>`:''}</td></tr>`;
        }).join('')}</tbody></table></div>` : `<div class="muted" style="font-size:12.5px;">${t('cp_no_invoices')}</div>`}
      </div>
      <div class="card" style="margin-top:18px;"><div class="card-head"><h3>${t('cp_documents_title')}</h3></div>
        <div class="small-caps" style="margin-bottom:8px;">${t('cp_documents_pending')}</div>
        ${pendingDocs.length? pendingDocs.map(doc=>`<div class="job-card"><div class="jc-title">${escapeHtml(doc.title)}</div><div style="display:flex;gap:8px;margin-top:10px;"><button class="btn btn-gold btn-sm" onclick="openSignDocumentModal('${doc.id}')">${ICONS.pen} ${t('cp_review_sign')}</button></div></div>`).join('') : `<div class="muted" style="font-size:12.5px;margin-bottom:14px;">${t('cp_no_documents_pending')}</div>`}
        <div class="small-caps" style="margin:14px 0 8px;">${t('cp_documents_signed')}</div>
        ${signedDocs.length? signedDocs.map(({doc,sig})=>`<div class="job-card" style="cursor:default;"><div class="jc-title">${escapeHtml(doc.title)}</div><div class="jc-meta">${ICONS.check} ${t('cp_signed_on')} ${fmtDate((sig.signedAt||'').slice(0,10))}</div></div>`).join('') : `<div class="muted" style="font-size:12.5px;">${t('cp_no_documents_signed')}</div>`}
      </div>
      <div class="card" style="margin-top:18px;"><div class="card-head"><h3>${t('cp_past_services')}</h3></div>
        ${past.length? past.map(j=>{ const svc=getService(j.service);
          return `<div class="job-card" style="cursor:default;"><div class="jc-title">${svcName(svc)}</div><div class="jc-meta">${ICONS.calendar}${fmtDateShort(j.date)}</div></div>`;
        }).join('') : `<div class="muted" style="font-size:12.5px;">${t('cp_no_past')}</div>`}
      </div>
    </div>`;
}
function openSignDocumentModal(documentId){
  const doc = clientPortalData.documents.find(d=>d.id===documentId);
  if(!doc) return;
  openModal(`<div class="modal-head"><h3>${t('cp_sign_modal_title')}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="form-row"><button class="btn btn-outline btn-block" onclick="viewDocumentFile('${doc.filePath}')">${ICONS.doc} ${t('view_document_btn')}: ${escapeHtml(doc.title)}</button></div>
    <div class="form-row"><label>${t('lbl_full_name_sign')}</label><input id="sig-name"></div>
    <div class="form-row" style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="sig-agree" style="width:auto;"><label for="sig-agree" style="margin:0;font-weight:400;">${t('cp_sign_agree_checkbox')}</label></div>
  </div>
  <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-gold" onclick="signDocument('${doc.id}')">${ICONS.pen} ${t('cp_sign_button')}</button></div>`);
}
async function signDocument(documentId){
  const name = document.getElementById('sig-name').value.trim();
  const agreed = document.getElementById('sig-agree').checked;
  if(!name || !agreed){ toast(t('err_generic'), ICONS.info); return; }
  const { error } = await sb.rpc('client_sign_document', { p_document_id: documentId, p_signed_name: name });
  if(error){ toast(error.message, ICONS.info); return; }
  closeModal();
  await loadClientPortalData(myProfile.client_id);
  renderClientPortal();
  toast(t('cp_doc_signed_toast'));
}
async function clientRespondQuote(quoteId, decision){
  const { error } = await sb.rpc('client_respond_to_quote', { p_quote_id: quoteId, p_decision: decision });
  if(error){ toast(error.message, ICONS.info); return; }
  await loadClientPortalData(myProfile.client_id);
  renderClientPortal();
  toast(t('cp_quote_updated'));
}
function openRequestQuoteModal(){
  openModal(`<div class="modal-head"><h3>${t('cp_request_quote_title')}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="form-row"><label>${t('cp_request_service')}</label><select id="rq-service">${serviceOptionsHtml()}</select></div>
    <div class="form-row"><label>${t('cp_request_notes')}</label><textarea id="rq-notes"></textarea></div>
  </div>
  <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-gold" onclick="submitQuoteRequest()">${t('cp_request_submit')}</button></div>`);
}
async function submitQuoteRequest(){
  const serviceId = document.getElementById('rq-service').value;
  const notes = document.getElementById('rq-notes').value.trim();
  const { error } = await sb.rpc('client_request_quote', { p_service_id: serviceId, p_notes: notes });
  if(error){ toast(error.message, ICONS.info); return; }
  closeModal();
  await loadClientPortalData(myProfile.client_id);
  renderClientPortal();
  toast(t('cp_request_sent'));
}
async function payInvoiceNow(invoiceId){
  toast(t('cp_redirecting'), ICONS.info);
  try{
    const res = await fetch('/api/create-checkout-session', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ invoiceId }) });
    const data = await res.json().catch(()=>({}));
    if(!res.ok || !data.url){ toast(data.error || t('cp_pay_error'), ICONS.info); return; }
    window.location.href = data.url;
  }catch(e){ toast(t('cp_pay_error'), ICONS.info); }
}
function checkPaymentReturn(){
  const params = new URLSearchParams(window.location.search);
  if(params.has('paid')){ toast(t('cp_payment_success')); }
  else if(params.has('canceled')){ toast(t('cp_payment_canceled'), ICONS.info); }
  if(params.has('paid') || params.has('canceled')){ window.history.replaceState({}, '', window.location.pathname); }
}

/* ==================================== BOOT ==================================== */
document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeModal(); });
(async function boot(){
  renderAuthScreen('signin');
  const { data: { session } } = await sb.auth.getSession();
  if(session){ await afterLogin(); }
  sb.auth.onAuthStateChange((event)=>{ if(event==='SIGNED_OUT'){ renderAuthScreen('signin'); } });
})();
</script>
